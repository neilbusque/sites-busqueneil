<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08080B"/>
      <stop offset="100%" stop-color="#13131A"/>
    </linearGradient>
    <linearGradient id="text-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A57"/>
      <stop offset="50%" stop-color="#E94F37"/>
      <stop offset="100%" stop-color="#B047C9"/>
    </linearGradient>
    <radialGradient id="orb-a">
      <stop offset="0%" stop-color="#E94F37" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E94F37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-b">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="200" cy="100" r="300" fill="url(#orb-a)"/>
  <circle cx="1050" cy="550" r="280" fill="url(#orb-b)"/>

  <g transform="translate(72, 80)">
    <rect x="0" y="0" rx="999" ry="999" width="248" height="40" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)"/>
    <circle cx="22" cy="20" r="5" fill="#E94F37"/>
    <text x="38" y="26" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#F2F2F4" letter-spacing="0.5">Now taking 10 launch clients</text>
  </g>

  <text x="72" y="280" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="800" fill="#FFFFFF" letter-spacing="-3">
    <tspan x="72" dy="0">A real website for your business.</tspan>
    <tspan x="72" dy="92">Built in a day. </tspan>
    <tspan font-family="Inter, sans-serif" fill="url(#text-g)">$50 a page.</tspan>
  </text>

  <text x="72" y="540" font-family="Inter, sans-serif" font-size="24" font-weight="500" fill="rgba(255,255,255,0.6)">Productized websites for local businesses. First 10 clients only.</text>

  <text x="72" y="585" font-family="JetBrains Mono, monospace" font-size="18" fill="#FF8A57" letter-spacing="1">sites.busqueneil.com</text>
</svg>
